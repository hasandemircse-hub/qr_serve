# Yerel geliştirme: PostgreSQL gerekmez. Çalıştırma: --spring.profiles.active=local
quickserve:
  public-cloud-url: "http://192.168.1.14:8080"
  guest:
    # Sabit Flutter Web portu (.vscode launch: edge_frontend :57632)
    web-base-url: "http://192.168.1.14:57632"
    edge-proxy-timeout-seconds: 15
  admin:
    edge-online-threshold-seconds: 180

spring:
  datasource:
    url: jdbc:h2:mem:qs_cloud;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration,classpath:db/migration-local
