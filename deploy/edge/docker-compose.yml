# QuickServe Edge — Restoran makinesi docker-compose
#
# İki çalıştırma modu (Edge için ÖNCELİKLİ olan "ÜRETİM"):
#
# ── ÜRETİM (Edge cihazı, zayıf donanım, sınırlı internet) ──────────────────
#   1. Senin (build sunucusu) makinende build edip tar.gz olarak gönder:
#      ./deploy/scripts/build-edge-images.sh
#      → /tmp/quickserve-edge-images-<tag>.tar.gz çıkar (≈350 MB)
#   2. Tar'ı Edge'e gönder: scp / rsync / USB
#   3. Edge'de yükle ve başlat:
#      docker load -i quickserve-edge-images-<tag>.tar.gz
#      cp .env.example .env  (değerleri doldur)
#      docker compose up -d                # `--build` YOK; image hazır
#
# ── GELİŞTİRİCİ (Mac, lokal dev, kodu hızlı dene) ─────────────────────────
#   1. cp .env.example .env  (değerleri doldur)
#   2. docker compose up -d --build        # Mac'te kendisi build eder
#
# Servisler:
#   postgres    : Edge yerel verisi (offline-first)
#   edge        : Spring Boot Edge API (8081)
#   caddy       : LAN reverse proxy + edge_frontend (Flutter Web, imaj içinde gömülü)
#   cloudflared : Cloudflare Tunnel sidecar (misafir trafiği için)

name: quickserve-edge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quickserve_edge}
      POSTGRES_USER: ${POSTGRES_USER:-quickserve}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quickserve}"]
      interval: 10s
      timeout: 5s
      retries: 10

  edge:
    # ÜRETİM: tar.gz ile yüklenen image ismi (build-edge-images.sh tag'ler).
    # DEV: local'de image yoksa Mac'te kendisi build eder.
    image: quickserve/edge:${EDGE_TAG:-local}
    build:
      context: ../..
      dockerfile: deploy/edge/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-quickserve_edge}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-quickserve}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      QUICKSERVE_JWT_SECRET: ${QUICKSERVE_JWT_SECRET}
      QUICKSERVE_EDGE_ID: ${QUICKSERVE_EDGE_ID}
      QUICKSERVE_RESTAURANT_ID: ${QUICKSERVE_RESTAURANT_ID}
      QUICKSERVE_PUBLIC_EDGE_URL: ${QUICKSERVE_PUBLIC_EDGE_URL}
      QUICKSERVE_PUBLIC_CLOUD_URL: ${QUICKSERVE_PUBLIC_CLOUD_URL}
      QUICKSERVE_CLOUD_BASE_URL: ${QUICKSERVE_CLOUD_BASE_URL}
      QUICKSERVE_GUEST_LAB_ENABLED: ${QUICKSERVE_GUEST_LAB_ENABLED:-false}
      QUICKSERVE_MEDIA_PRODUCT_IMAGES_DIR: /app/data/product-images
      QUICKSERVE_MEDIA_MAX_IMAGE_BYTES: ${QUICKSERVE_MEDIA_MAX_IMAGE_BYTES:-5242880}
      # Edge ↔ Cloud sync auth (Cloud'unkiyle birebir aynı olmalı; boşsa korumasız)
      QUICKSERVE_SYNC_SHARED_SECRET: ${QUICKSERVE_SYNC_SHARED_SECRET:-}
    volumes:
      - product_images:/app/data/product-images
    expose:
      - "8081"

  caddy:
    # Multi-stage Dockerfile.caddy edge_frontend'i (Flutter Web) imaj içinde derler.
    # Host'ta `flutter` kurulu olması gerekmez.
    # ÜRETİM: tar.gz ile yüklenir; build atlanır.
    # DEV: local'de image yoksa Mac'te kendisi build eder (~45 sn).
    image: quickserve/edge-caddy:${EDGE_TAG:-local}
    build:
      context: ../..
      dockerfile: deploy/edge/Dockerfile.caddy
    restart: unless-stopped
    depends_on:
      - edge
    ports:
      - "80:80"
      - "443:443"
    environment:
      EDGE_LAN_HOSTNAME: ${EDGE_LAN_HOSTNAME:-edge.local}
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  # Cloudflare Tunnel — NAMED tunnel modu (üretim).
  #
  # Token .env içinde `CLOUDFLARED_TUNNEL_TOKEN` olarak saklanır.
  # Public hostname Cloudflare Zero Trust panelinden tanımlanır
  # (örn. edge.qrserve.co → http://edge:8081).
  #
  # QUICK tunnel'a geri dönmek istersen (test, domain yok):
  #   command: ["tunnel", "--no-autoupdate", "--url", "http://edge:8081"]
  # ve `environment` bloğunu kaldır. URL'i loglardan al.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - edge
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN}
    command: ["tunnel", "--no-autoupdate", "run"]

volumes:
  postgres_data:
  product_images:
  caddy_data:
  caddy_config:
